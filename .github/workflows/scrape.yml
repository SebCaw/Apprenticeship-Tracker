name: Scrape GOV.UK apprenticeships

# Runs twice a day (≈10am & 6pm UK) and can also be triggered manually from the Actions tab.
# Times are UTC: 09:00 & 17:00 UTC = 10am & 6pm during British Summer Time (the autumn season).
on:
  schedule:
    - cron: "0 9,17 * * *"
  workflow_dispatch: {}   # manual "run now" button in the GitHub Actions tab

permissions:
  contents: write          # allow the job to commit the updated data.json

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run GOV.UK scraper (PowerShell)
        shell: pwsh
        run: ./scrape.ps1
        env:
          # Telegram notifications: add these as repo SECRETS (Settings → Secrets and variables → Actions → Secrets).
          # The bot token is sensitive — it must be a Secret, never committed to the repo.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Optional alternative — ntfy.sh topic as a repo Variable (not secret).
          NTFY_TOPIC: ${{ vars.NTFY_TOPIC }}

      - name: Commit updated data if changed
        run: |
          git config user.name  "apprenticeship-bot"
          git config user.email "actions@github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "Auto-update apprenticeship data ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
